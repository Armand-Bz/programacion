<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JaFastBenAparcat | Equip</title>
    <link rel="icon" href="App/JaFastBenAparcat.png" type="image/png">
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            overflow-x: hidden;
            overscroll-behavior: none;
        }

        /* ========== NAVBAR (identical to menu.html) ========== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2.2rem;
            z-index: 100;
            pointer-events: auto;
            mix-blend-mode: difference;
        }
        .logo-nav {
            display: inline-block;
            text-decoration: none;
            transition: opacity 0.2s ease;
            cursor: pointer;
        }
        .logo-nav img {
            width: 160px;
            height: auto;
            filter: brightness(0) invert(1) drop-shadow(0 2px 6px rgba(0,0,0,0.4));
            transition: transform 0.2s, filter 0.2s;
            display: block;
        }
        .logo-nav:hover img {
            transform: scale(1.02);
            filter: brightness(0) invert(1) drop-shadow(0 4px 10px rgba(0,0,0,0.5));
        }
        .nav-r {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-link {
            text-decoration: none;
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            opacity: 0.85;
            transition: opacity 0.2s, transform 0.2s;
            text-transform: lowercase;
            position: relative;
        }
        .nav-link:hover {
            opacity: 1;
            transform: translateY(-1px);
        }
        .nav-link.active-page {
            opacity: 1;
            font-weight: 600;
        }
        .nav-link.active-page::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 100%;
            height: 1.5px;
            background: white;
            border-radius: 2px;
            opacity: 0.8;
        }
        .menu-btn {
            background: rgba(255,255,255,0.15);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            font-weight: 600;
        }
        @media (max-width: 860px) {
            .navbar { padding: 1rem 1.2rem; }
            .nav-r { gap: 1rem; }
            .nav-link { font-size: 0.75rem; }
            .logo-nav img { width: 120px; }
        }
        @media (max-width: 680px) {
            .nav-r { gap: 0.8rem; }
            .nav-link { font-size: 0.7rem; }
            .logo-nav img { width: 100px; }
            .menu-btn { padding: 0.3rem 0.9rem; }
        }

        /* ========== FULLSCREEN SLIDER (same style as equip but upgraded to match menu.html elegance) ========== */
        .slider-master {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        .slides-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .slide-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            will-change: opacity;
            transition: opacity 0.9s cubic-bezier(0.25, 0.95, 0.45, 1);
        }

        .slide-layer.active {
            z-index: 2;
            opacity: 1;
        }

        .slide-layer.inactive {
            z-index: 1;
            opacity: 0;
        }

        .split-slide {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .split-half {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .split-half img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: brightness(0.85) contrast(1.05);
            transition: transform 6s ease-out;
        }

        .split-slide:hover .split-half img {
            transform: scale(1.03);
        }

        /* Overlay gradient per millorar llegibilitat (com a menu.html) */
        .slider-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 5;
        }

        /* ========== CENTER CARD (identical styling to menu.html content card) ========== */
        .center-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 30;
            width: clamp(280px, 40vw, 540px);
            background: rgba(8, 8, 12, 0.7);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4);
            text-align: center;
            padding: 1.6rem 1.2rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .center-card:hover {
            background: rgba(8, 8, 12, 0.85);
            backdrop-filter: blur(22px);
            border-color: rgba(255, 255, 255, 0.35);
            transform: translate(-50%, -50%) scale(1.02);
        }

        .text-container {
            overflow: hidden;
        }

        .project-name {
            font-size: clamp(2rem, 5.5vw, 3.4rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #FFFFFF 0%, #f5f5f5 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.4rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .project-sub {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.95);
            background: rgba(0, 0, 0, 0.5);
            display: inline-block;
            padding: 0.25rem 1rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        /* text animation classes */
        .text-exit-up {
            transform: translateY(-24px) !important;
            opacity: 0 !important;
        }
        .text-exit-down {
            transform: translateY(24px) !important;
            opacity: 0 !important;
        }

        /* navigation dots - same style as menu.html */
        .slider-nav {
            position: absolute;
            bottom: 2rem;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 1rem;
            z-index: 25;
            backdrop-filter: blur(8px);
            padding: 0.5rem 1.2rem;
            width: fit-content;
            margin: 0 auto;
            border-radius: 60px;
            background: rgba(0, 0, 0, 0.4);
            pointer-events: auto;
        }

        .nav-dot {
            width: 44px;
            height: 3px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-dot.active {
            background: white;
            width: 70px;
            box-shadow: 0 0 8px rgba(255, 255, 200, 0.5);
        }

        .nav-dot:hover {
            background: rgba(255, 255, 255, 0.8);
            width: 56px;
        }

        /* arrows */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            width: 46px;
            height: 46px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 25;
            transition: all 0.2s;
            color: white;
            font-size: 1.3rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-arrow:hover {
            background: rgba(0, 0, 0, 0.7);
            transform: translateY(-50%) scale(1.05);
        }

        .arrow-left { left: 1.5rem; }
        .arrow-right { right: 1.5rem; }

        /* grain overlay (subtle texture) */
        .grain-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 12;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='1' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
        }

        @media (max-width: 768px) {
            .center-card { width: 80vw; padding: 1rem 0.8rem; border-radius: 1.5rem; }
            .nav-dot { width: 28px; }
            .nav-dot.active { width: 48px; }
            .arrow-left, .arrow-right { width: 38px; height: 38px; font-size: 1rem; }
            .arrow-left { left: 0.8rem; }
            .arrow-right { right: 0.8rem; }
        }

        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

<nav class="navbar">
    <a class="logo-nav">
        <img src="App/title.png" alt="JaFastBenAparcat Logo">
    </a>
    <div class="nav-r">
        <a href="menu.html" class="nav-link menu-btn">menu</a>
        <a href="sobre.html" class="nav-link">sobre</a>
        <a href="solucions.html" class="nav-link">solucions</a>
        <a href="equip.html" class="nav-link active-page">equip</a>
        <a href="eixos.html" class="nav-link">eixos</a>
        <a href="eix-triat.html" class="nav-link">eix triat</a>
        <a href="https://www.instagram.com/jafastbenaparcat_official/" target="_blank" class="nav-link">instagram</a>
        <a href="https://mail.google.com/mail/?view=cm&fs=1&to=JaFastBenAparcat@gmail.com" target="_blank" class="nav-link">contact</a>
    </div>
</nav>

<div class="slider-master">
    <div class="slides-container" id="slidesContainer">
        <div class="slide-layer active" id="layerA"></div>
        <div class="slide-layer inactive" id="layerB"></div>
    </div>
    <div class="slider-overlay"></div>
    <div class="grain-overlay"></div>

    <div class="center-card" id="centerCard">
        <div class="text-container">
            <div class="project-name" id="projectName">Fabio</div>
            <div class="project-sub" id="projectCountry">Cuba</div>
        </div>
    </div>

    <div class="slider-nav" id="sliderNav"></div>
    <div class="nav-arrow arrow-left" id="prevBtn"><i class="fas fa-chevron-left"></i></div>
    <div class="nav-arrow arrow-right" id="nextBtn"><i class="fas fa-chevron-right"></i></div>
</div>

<script>
    // PROJECT DATA (imatges dels membres)
    const projects = [
        { id: 0, name: "Fabio", country: "Cuba", leftImg: "Persones/Fabio.png", rightImg: "Paisos/cuba.png" },
        { id: 1, name: "Armand", country: "Polonia", leftImg: "Persones/Armand.jpg", rightImg: "Paisos/polonia.png" },
        { id: 2, name: "Jordi", country: "Espanya", leftImg: "Persones/Jordi.jpg", rightImg: "Paisos/españa.png" },
        { id: 3, name: "Arnau", country: "França", leftImg: "Persones/Arnau.jpg", rightImg: "Paisos/francia.png" },
        { id: 4, name: "Tim", country: "Suècia", leftImg: "Persones/Tim.jpg", rightImg: "Paisos/suecia.png" },
        { id: 5, name: "Salvador", country: "Catalunya", leftImg: "Persones/Salva.jpg", rightImg: "Paisos/cataluña.png" }
    ];

    let currentIndex = 0;
    let activeLayer = 'A';
    let isTransitioning = false;
    let textAnimating = false;

    const layerA = document.getElementById('layerA');
    const layerB = document.getElementById('layerB');
    const projectNameEl = document.getElementById('projectName');
    const projectCountryEl = document.getElementById('projectCountry');
    const navContainer = document.getElementById('sliderNav');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const centerCard = document.getElementById('centerCard');

    function buildSlideHTML(project) {
        return `
            <div class="split-slide">
                <div class="split-half">
                    <img src="${project.leftImg}" alt="${project.name}" loading="eager">
                </div>
                <div class="split-half">
                    <img src="${project.rightImg}" alt="${project.country}" loading="eager">
                </div>
            </div>
        `;
    }

    function animateTextChange(newName, newCountry, direction = 'next') {
        if (textAnimating) return Promise.resolve();
        textAnimating = true;
        return new Promise((resolve) => {
            const exitClass = (direction === 'next') ? 'text-exit-up' : 'text-exit-down';
            
            projectNameEl.style.transition = 'transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity 0.3s ease';
            projectCountryEl.style.transition = 'transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity 0.3s ease';
            
            projectNameEl.classList.add(exitClass);
            projectCountryEl.classList.add(exitClass);

            setTimeout(() => {
                projectNameEl.innerText = newName;
                projectCountryEl.innerText = newCountry;
                
                projectNameEl.classList.remove(exitClass);
                projectCountryEl.classList.remove(exitClass);
                
                projectNameEl.style.transform = '';
                projectCountryEl.style.transform = '';
                projectNameEl.style.opacity = '';
                projectCountryEl.style.opacity = '';
                
                textAnimating = false;
                resolve();
            }, 200);
        });
    }

    async function switchToIndex(newIndex, direction = 'next') {
        if (isTransitioning || textAnimating) return;
        if (newIndex === currentIndex) return;
        if (newIndex < 0) newIndex = projects.length - 1;
        if (newIndex >= projects.length) newIndex = 0;

        isTransitioning = true;
        const nextProject = projects[newIndex];
        const nextHTML = buildSlideHTML(nextProject);
        
        const currentActiveLayer = (activeLayer === 'A') ? layerA : layerB;
        const currentInactiveLayer = (activeLayer === 'A') ? layerB : layerA;
        
        currentInactiveLayer.innerHTML = nextHTML;
        currentInactiveLayer.style.opacity = '0';
        currentInactiveLayer.classList.remove('active');
        currentInactiveLayer.classList.add('inactive');
        
        void currentInactiveLayer.offsetHeight;
        
        currentActiveLayer.style.opacity = '0';
        currentActiveLayer.classList.add('inactive');
        currentActiveLayer.classList.remove('active');
        
        currentInactiveLayer.style.opacity = '1';
        currentInactiveLayer.classList.add('active');
        currentInactiveLayer.classList.remove('inactive');
        
        await animateTextChange(nextProject.name, nextProject.country, direction);
        
        if (activeLayer === 'A') {
            activeLayer = 'B';
        } else {
            activeLayer = 'A';
        }
        currentIndex = newIndex;
        
        const dots = document.querySelectorAll('.nav-dot');
        dots.forEach((dot, i) => {
            if (i === currentIndex) {
                dot.classList.add('active');
            } else {
                dot.classList.remove('active');
            }
        });
        
        setTimeout(() => {
            isTransitioning = false;
        }, 900);
    }

    function nextSlide() {
        if (isTransitioning || textAnimating) return;
        let nextIdx = currentIndex + 1;
        if (nextIdx >= projects.length) nextIdx = 0;
        switchToIndex(nextIdx, 'next');
    }

    function prevSlide() {
        if (isTransitioning || textAnimating) return;
        let prevIdx = currentIndex - 1;
        if (prevIdx < 0) prevIdx = projects.length - 1;
        switchToIndex(prevIdx, 'prev');
    }

    function buildDots() {
        navContainer.innerHTML = '';
        projects.forEach((proj, idx) => {
            const dot = document.createElement('div');
            dot.classList.add('nav-dot');
            if (idx === currentIndex) dot.classList.add('active');
            dot.addEventListener('click', (e) => {
                e.stopPropagation();
                if (idx !== currentIndex && !isTransitioning && !textAnimating) {
                    const dir = idx > currentIndex ? 'next' : 'prev';
                    switchToIndex(idx, dir);
                }
            });
            navContainer.appendChild(dot);
        });
    }

    function initFirstSlide() {
        const firstProject = projects[0];
        const secondProject = projects[1];
        layerA.innerHTML = buildSlideHTML(firstProject);
        layerB.innerHTML = buildSlideHTML(secondProject);
        layerA.style.opacity = '1';
        layerB.style.opacity = '0';
        layerA.classList.add('active');
        layerB.classList.add('inactive');
        activeLayer = 'A';
        projectNameEl.innerText = firstProject.name;
        projectCountryEl.innerText = firstProject.country;
        currentIndex = 0;
        
        buildDots();
        
        projects.forEach(proj => {
            const imgLeft = new Image();
            imgLeft.src = proj.leftImg;
            const imgRight = new Image();
            imgRight.src = proj.rightImg;
        });
    }

    prevBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        prevSlide();
    });
    nextBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        nextSlide();
    });
    
    centerCard.addEventListener('click', () => {
        const curr = projects[currentIndex];
        alert(`✨ ${curr.name} · ${curr.country} ✨`);
    });
    
    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') {
            prevSlide();
            e.preventDefault();
        } else if (e.key === 'ArrowRight') {
            nextSlide();
            e.preventDefault();
        }
    });
    
    let touchStartX = 0;
    let touchEndX = 0;
    const masterDiv = document.querySelector('.slider-master');
    masterDiv.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
    });
    masterDiv.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        if (Math.abs(touchEndX - touchStartX) > 50) {
            if (touchEndX < touchStartX) nextSlide();
            else prevSlide();
        }
    });
    
    initFirstSlide();
</script>

<style>
    .split-half img {
        background: #1a1a1c;
    }
    .center-card {
        pointer-events: auto;
        cursor: pointer;
    }
    .project-name, .project-sub {
        will-change: transform, opacity;
    }
    .navbar .logo-nav img {
        max-width: 160px;
        width: 160px;
        object-fit: contain;
    }
    .nav-link.active-page::after {
        content: '';
        position: absolute;
        bottom: -5px;
        left: 0;
        width: 100%;
        height: 2px;
        background: white;
        border-radius: 2px;
        opacity: 0.8;
    }
    /* Assegurar que el slider tingui el mateix overlay que menu.html */
    .slider-overlay {
        background: radial-gradient(circle at center, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.65) 100%);
    }
    @media (max-width: 700px) {
        .navbar .logo-nav img { width: 115px; }
        .nav-link { font-size: 0.7rem; }
        .nav-r { gap: 0.9rem; }
        .menu-btn { padding: 0.3rem 0.9rem; }
    }
</style>
</body>
</html>
