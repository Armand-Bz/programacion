<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JaFastBenAparcat | Eixos del Projecte</title>
    <link rel="icon" href="JaFastBenAparcat.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            overflow-x: hidden;
            overscroll-behavior: none;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2.2rem;
            z-index: 100;
            pointer-events: auto;
            mix-blend-mode: difference;
        }
        .logo-nav {
            display: inline-block;
            text-decoration: none;
            transition: opacity 0.2s ease;
            cursor: default;
        }
        .logo-nav img {
            width: 160px;
            height: auto;
            filter: brightness(0) invert(1) drop-shadow(0 2px 6px rgba(0,0,0,0.4));
            transition: transform 0.2s, filter 0.2s;
            display: block;
        }
        .logo-nav:hover img {
            transform: scale(1.02);
            filter: brightness(0) invert(1) drop-shadow(0 4px 10px rgba(0,0,0,0.5));
        }
        .nav-r {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-link {
            text-decoration: none;
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            opacity: 0.85;
            transition: opacity 0.2s, transform 0.2s;
            text-transform: lowercase;
            position: relative;
        }
        .nav-link:hover {
            opacity: 1;
            transform: translateY(-1px);
        }
        .nav-link.active-page {
            opacity: 1;
            font-weight: 600;
        }
        .nav-link.active-page::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 100%;
            height: 1.5px;
            background: white;
            border-radius: 2px;
            opacity: 0.8;
        }
        .menu-btn {
            background: rgba(255,255,255,0.15);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            font-weight: 600;
        }
        @media (max-width: 860px) {
            .navbar { padding: 1rem 1.2rem; }
            .nav-r { gap: 1rem; }
            .nav-link { font-size: 0.75rem; }
            .logo-nav img { width: 120px; }
        }
        @media (max-width: 680px) {
            .nav-r { gap: 0.8rem; }
            .nav-link { font-size: 0.7rem; }
            .logo-nav img { width: 100px; }
            .menu-btn { padding: 0.3rem 0.9rem; }
        }

        .eixos-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0f 0%, #121218 100%);
            display: flex;
            align-items: center;
            padding-top: 80px;
            padding-bottom: 80px;
        }

        .eixos-wrapper {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .page-header h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #c0c0c0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }
        .page-header p {
            font-size: 1.1rem;
            color: rgba(255,255,240,0.8);
            max-width: 700px;
            margin: 0 auto;
        }

        .eixos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .eix-card {
            background: rgba(8, 8, 12, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .eix-card:hover {
            transform: translateY(-6px);
            background: rgba(12, 12, 18, 0.85);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
        }

        .eix-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .eix-card:hover .eix-image {
            transform: scale(1.03);
        }
        .eix-image-placeholder {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: rgba(255,255,255,0.25);
            font-weight: 500;
        }

        .eix-content {
            padding: 1.8rem;
            text-align: center;
        }
        .eix-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.5rem;
        }
        .eix-description {
            font-size: 0.9rem;
            line-height: 1.5;
            color: rgba(255,255,240,0.75);
        }

        @media (max-width: 860px) {
            .eixos-grid { grid-template-columns: 1fr; gap: 1.5rem; }
            .page-header h1 { font-size: 2rem; }
            .eix-title { font-size: 1.3rem; }
            .eix-content { padding: 1.2rem; }
        }

        .bg-accent {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 20%, rgba(70,70,100,0.12) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
            z-index: -1;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-container {
            max-width: 100%;
            max-height: 100%;
            width: 900px;
            background: rgba(10, 10, 15, 0.96);
            backdrop-filter: blur(20px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden;
            animation: modalFadeIn 0.25s ease;
            position: relative;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-header {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: white;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: rgba(255,255,255,0.7);
            transition: color 0.2s;
        }
        .modal-close:hover {
            color: white;
        }
        .modal-body {
            padding: 1.5rem;
            max-height: 60vh;
            overflow-y: auto;
            color: rgba(255,255,240,0.9);
            white-space: pre-wrap;
        }
        .modal-body::-webkit-scrollbar {
            width: 6px;
        }
        .modal-body::-webkit-scrollbar-track {
            background: rgba(30, 30, 35, 0.5);
            border-radius: 10px;
        }
        .modal-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }
        .modal-body::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }
        .modal-section {
            margin-bottom: 0.75rem;
        }
        .modal-section-title {
            font-weight: 700;
            color: #FFD966;
            margin-bottom: 0.25rem;
            font-size: 1rem;
        }
        .modal-section p {
            line-height: 1.5;
            margin-bottom: 0;
        }
        hr {
            border-color: rgba(255,255,255,0.1);
            margin: 0.75rem 0;
        }
    </style>
</head>

                <div class="eix-content">

            <div class="eix-card" data-eix="inclusio">
                <img src="equitat_inclusio.jpg" alt="Equitat i Inclusió" class="eix-image" onerror="this.style.display='none'; this.nextElementSibling?.style.setProperty('display','flex')">

<div id="modalOverlay" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h2 id="modalTitle"></h2>
            <button class="modal-close" id="modalCloseBtn"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
            const eixosData = {
        media: {
            title: "Educació Mediàtica",
            content: `<div class="modal-section"><div class="modal-section-title">De que tracta el eix</div><p>L'educació mediàtica és un eix que té en compte l’anàlisi de continguts i el consum crític de la informació i apliquen l’ètica en la producció i difusió d’informació. Amb continguts propis vinculats a l’alfabetització mediàtica. Unes propostes per fomentar habilitats crítiques per navegar pel món digital i que promoguin una ciutadania digital activa i responsable. I contribuir en la formació i conscienciació de l’alumnat en la identitat, privacitat i seguretat digital.</p></div><hr><div class="modal-section"><div class="modal-section-title">Titol</div><p>Cloret TV</p></div><div class="modal-section"><div class="modal-section-title">Resum</div><p>L’Ambient d’Aprenentatge Cloret TV se centra en el periodisme digital. L’alumnat treballa setmanalment en la creació d’un programa de televisió, assumint diferents rols tècnics i de redacció. En grups internivell, elaboren el guió, enregistren les seccions amb iPads, preparen la il·luminació i el so, editen el vídeo amb iMovie i el publiquen al canal de YouTube de l’escola. Els continguts parteixen de la seva realitat i interessos, destacant activitats de la comunitat educativa. El treball és principalment autònom, amb el docent com a guia i dinamitzador.</p></div><div class="modal-section"><div class="modal-section-title">Quina problemàtica abordava?</div><p>La problemàtica que té que no és permanent, l'alumnat pot avorrir-se fent cada setmana això i que un equip d'edició i que no n'hi hagi cap error durant la presentació és bastant difícil pel nivell actual.</p></div>`
        },
        global: {
            title: "Ciutadania democràtica i consciència global",
            content: `<div class="modal-section"><div class="modal-section-title">De que tracta el eix</div><p>- Visibilitzar i desenvolupar projectes d’entorn que impliquin activitats i actes reals de consciencia, competencia global i sostenibilitat ambiental.<br>- Promoure entitats locals i ONG del territori pel foment de sotenibilitat social, economic, i ecologic basant-se en justicia social i global.<br>- Visibilitzar i impulsar drets humans, d’infants, els valors que s’aprenen i identitats culturals per generar un efecte positiu i riquesa cultural.</p></div><hr><div class="modal-section"><div class="modal-section-title">Titol</div><p>Codi per al canvi: programa el futur</p></div><div class="modal-section"><div class="modal-section-title">Resum</div><p>Després de investigar diferents problematiques socials, entrevistar a variis ONG i fer enquestes a alumnes voluntaris més posar-los en la pell d’altres, el grup va crear l’app Needu, una app que augmenta la participació i empatia a persones en necessitat al permitir solicitar-se a persones amb necessitats al click d’un botó. Deixan’t-the escolli l’area on vols ajudar, el rang d’eda, el teu horari i també veure a referents. El grup ha fet un pla de negoci per poder publicar l’app al mon real.</p></div><div class="modal-section"><div class="modal-section-title">Quina problematica abordava?</div><p>Aquesta app vol despertar a les persones perque observin el seu entorn i es donin compte de quantes persones hi ha que necessiten ajuda i siguin empatics amb ells, donant-lis l’ajuda que no poden aconseguir.</p></div>`
        },
        cultura: {
            title: "Llengua, cultura i diversitat",
            content: `<div class="modal-section"><div class="modal-section-title">De que tracta el eix</div><p>Reforçar un enfocament comunicatiu en l'ensenyament de les llengües, adaptat a la societat diversa.<br>Impulsar activitats que facin visibles les llengües familiars per millorar la competència lingüística.<br>Promoure la biblioteca escolar com a recurs clau per a una educació de qualitat i per despertar l'interès per la lectura.<br>Integrar les diferents llengües i cultures presents a l'aula, evitant estereotips culturals.</p></div><hr><div class="modal-section"><div class="modal-section-title">Titol</div><p>Minibus cultural</p></div><div class="modal-section"><div class="modal-section-title">Resum</div><p>L'alumnat va començar aprenent els bàsics de la placa ESP32. Després, van desenvolupar un projecte de robòtica social que consisteix en un minibús autònom destinat a difondre el patrimoni cultural de la ciutat de Vic. El vehicle recorre diversos espais d'interès cultural i activa llums i sons per fer l'experiència més atractiva, utilitzant tecnologia loT amb ESP-NOW.</p></div><div class="modal-section"><div class="modal-section-title">Quina problematica abordava?</div><p>El projecte era un exemple de com promoure la cultura de vic. Amb la tecnologia de la ESP32 difonia la cultura de la ciutat de Vic d'una manera diferent a la acostumada.</p></div>`
        },
        benestar: {
            title: "Benestar emocional i social",
            content: `<div class="modal-section"><div class="modal-section-title">De que tracta el eix</div><p>Aquest eix s’especialitza en que els infants, adolescents i joves puguin prendre consciencia de les seves emocions i dels altres, apart de fomentar la comunicació no violenta i desenvolupar projectes que fomentin la convivencia escolar.</p></div><hr><div class="modal-section"><div class="modal-section-title">Titol</div><p>Missió RCP</p></div><div class="modal-section"><div class="modal-section-title">Resum</div><p>El projecte va començar amb una formació en reanimació cardiopulmonar (RCP) per part d’un formador qualificat per a l’alumnat de 6è. La missió és divulgar aquesta formació en RCP, la creació dels maniquins, la programació amb Bitbloq, el disseny de pantalles amb Snap! i la realizació de seminaris per formar altres alumnes i families.</p></div><div class="modal-section"><div class="modal-section-title">Quina problematica abordava?</div><p>Abordava la formació amb reanimació cardiopulmonar. Des del benestar emocional i social l’alumnat aprèn a mantenir la calma, prendre decisions i ajudar amb empatia en situacions reals d’emergència, desenvolupant autoestima, confiança i cohesió de grup.</p></div>`
        },
        art: {
            title: "Art i creativitat",
            content: `<div class="modal-section"><div class="modal-section-title">De que tracta el eix</div><p>Aquest eix utilitza l'art i la creativitat per ajudar les persones a entendre's millor i sentir-se part d'un grup. Perquè aquests poden servir per a millorar la convivència.</p></div><hr><div class="modal-section"><div class="modal-section-title">Titol</div><p>El Contacontes</p></div><div class="modal-section"><div class="modal-section-title">Resum</div><p>És un escape room amb realitat virtual basat en rondalles catalanes. Els joves entren dins la història i fan proves com si estiguessin dins del conte.</p></div><div class="modal-section"><div class="modal-section-title">Quina problematica abordava?</div><p>Molts joves no connecten amb la cultura catalana perquè la veuen poc interessant. El joc ho transforma en una experiència divertida.</p></div>`
        },
        inclusio: {
            title: "Equitat i inclusió",
            content: `<div class="modal-section"><div class="modal-section-title">De que tracta el eix</div><p>Tracta de com es pot reduir les desigualtats. Per exemple físiques o mentals.</p></div><hr><div class="modal-section"><div class="modal-section-title">Titol</div><p>Pictorutines</p></div><div class="modal-section"><div class="modal-section-title">Resum</div><p>És un asistent de veu per rutines per alumnes amb TDAH. Es vasa amb pictogrames que els han fet uns docents d’un centre d’educació especial. També utilitza IA per a recrear la veu.</p></div><div class="modal-section"><div class="modal-section-title">Quina problematica abordava?</div><p>Intenta solucionar la problematica que pateixen molts alumnes amb TDAH. Molts d’aquests tenen problemes per saber que han de fer i els ajuda a saber que fer i a seguir rutines.</p></div>`
        }
    };

    const modalOverlay = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const modalCloseBtn = document.getElementById('modalCloseBtn');

    function openModal(eixKey) {
        const data = eixosData[eixKey];
        if (!data) return;
        
        modalTitle.textContent = data.title;
        modalBody.innerHTML = data.content;
        
        modalOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        modalOverlay.classList.remove('active');
        document.body.style.overflow = '';
    }

    const cards = document.querySelectorAll('.eix-card');
    cards.forEach(card => {
        card.addEventListener('click', () => {
            const eixClass = card.getAttribute('data-eix');
            if (eixClass && eixosData[eixClass]) {
                openModal(eixClass);
            }
        });
    });

    modalCloseBtn.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) closeModal();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
            closeModal();
        }
    });

    const images = document.querySelectorAll('.eix-image');
    images.forEach(img => {
        img.addEventListener('error', () => {
            img.style.display = 'none';
            const placeholder = img.nextElementSibling;
            if (placeholder && placeholder.classList.contains('eix-image-placeholder')) {
                placeholder.style.display = 'flex';
            }
        });
    });
</script>
</body>
</html>
